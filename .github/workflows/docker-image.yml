name: Docker Images (Two-Layer)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      upstream_version:
        description: "上游 CyberStrikeAI 版本 (Tools 镜像 tools/*.yaml 来源)"
        required: false
        default: "v1.6.47"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Tools 基础镜像（独立，不依赖主程序源码）----
  tools:
    runs-on: ubuntu-latest
    # 手动触发 或 install-tools.sh 有变更时才构建
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Free up disk space
        run: |
          echo "Before:"; df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift \
            "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean || true
          docker image prune -af || true
          echo "After:"; df -h /

      - name: Prepare image metadata
        id: prep
        shell: bash
        run: |
          owner="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner}/offsec-tools" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=raw,value=pr-${{ github.event.pull_request.number }},enable=${{ github.event_name == 'pull_request' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ inputs.upstream_version || 'v1.6.47' }},enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and publish Tools image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.tools
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          platforms: linux/amd64
          build-args: |
            tools_version=${{ inputs.upstream_version || 'v1.6.47' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=tools
          cache-to: type=gha,mode=max,scope=tools

  # ---- App 主程序镜像（依赖 Tools 基础镜像）----
  app:
    runs-on: ubuntu-latest
    needs: tools
    if: always() && !cancelled()
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Free up disk space
        run: |
          echo "Before:"; df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift \
            "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean || true
          docker image prune -af || true
          echo "After:"; df -h /

      - name: Prepare image metadata
        id: prep
        shell: bash
        run: |
          owner="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "tools_image=ghcr.io/${owner}/offsec-tools" >> "${GITHUB_OUTPUT}"
          echo "app_image=ghcr.io/${owner}/cyberstrikeai" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.prep.outputs.app_image }}
          tags: |
            type=raw,value=pr-${{ github.event.pull_request.number }},enable=${{ github.event_name == 'pull_request' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and publish App image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.app
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          platforms: linux/amd64
          build-args: |
            TOOLS_IMAGE=${{ steps.prep.outputs.tools_image }}:latest
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app
