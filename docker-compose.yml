# CyberStrikeAI Offline Deployment
# 两层镜像策略：
#   1. cyberstrikeai-tools (工具层) — 工具变动才更新，手动触发构建
#   2. cyberstrikeai      (主程序层) — 每次上游更新重建，依赖 tools 层
#
# 离线部署步骤：
#   docker load < cyberstrikeai-tools-v1.6.47.tar.gz   # 加载工具层（仅首次/工具更新时）
#   docker load < cyberstrikeai-v1.6.47.tar.gz         # 加载主程序层（每次版本更新）
#   docker compose up -d

services:
  cyberstrikeai:
    image: ghcr.io/v3teran/cyberstrikeai:latest
    container_name: cyberstrikeai
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./runtime-config:/app/runtime-config
      - ./data:/app/data
      - ./tmp:/app/tmp
    # Uncomment if you need raw-socket or advanced scan modes.
    # cap_add:
    #   - NET_ADMIN
    #   - NET_RAW
